<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SaaS Mail AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #111827);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fade 0.6s ease-in-out;
}

@keyframes fade {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input, textarea, select {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #4f46e5;
    transform: scale(1.02);
}
</style>
</head>

<body>

<div class="card">
    <h1>🧾 Mail AI SaaS</h1>

    <form action="/generate" method="post">
        <input name="name" placeholder="Nom" required>

        <select name="service">
            <option value="catastro">Catastro</option>
            <option value="banque">Banque</option>
            <option value="avocat">Avocat</option>
        </select>

        <input name="nie" placeholder="NIE">
        <input name="address" placeholder="Adresse">

        <textarea name="message" placeholder="Ton message..." rows="5"></textarea>

        <button type="submit">🚀 Générer le mail</button>
    </form>
</div>

</body>
</html>
